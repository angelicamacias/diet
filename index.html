<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nutrition Label Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }

    header {
      background: #16a34a;
      color: white;
      padding: 1rem 1.5rem;
      font-size: 1.2rem;
      font-weight: 600;
    }

    main { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
      margin-bottom: 1.5rem;
    }

    h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #444; }

    label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: .35rem; }

    input[type="text"] {
      width: 100%; padding: .6rem .8rem; border: 1px solid #d1d5db;
      border-radius: 8px; font-size: .95rem; margin-bottom: 1rem;
    }

    .drop-zone {
      border: 2px dashed #d1d5db; border-radius: 10px;
      padding: 2rem; text-align: center; cursor: pointer;
      color: #9ca3af; font-size: .9rem; transition: border-color .2s;
      margin-bottom: 1rem; position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #16a34a; color: #16a34a; }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }

    #preview { max-width: 100%; border-radius: 8px; display: none; margin-bottom: 1rem; }

    button {
      width: 100%; padding: .75rem; background: #16a34a; color: white;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    button:hover { background: #15803d; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }

    #status { margin-top: 1rem; font-size: .875rem; }
    .success { color: #16a34a; }
    .error   { color: #dc2626; }

    pre {
      background: #f9fafb; border-radius: 8px; padding: 1rem;
      font-size: .8rem; overflow-x: auto; white-space: pre-wrap;
    }

    .foods-list { display: flex; flex-wrap: wrap; gap: .5rem; }
    .food-tag {
      background: #dcfce7; color: #15803d; border-radius: 20px;
      padding: .25rem .75rem; font-size: .85rem; cursor: pointer;
    }
    .food-tag:hover { background: #bbf7d0; }
  </style>
</head>
<body>

<header>🥦 Nutrition Label Scanner</header>

<main>
  <!-- Upload card -->
  <div class="card">
    <h2>Add a new food</h2>

    <label for="foodName">Food name</label>
    <input type="text" id="foodName" placeholder="e.g. YogurtDanone" />

    <label>Nutrition label photo</label>
    <div class="drop-zone" id="dropZone">
      Click or drag an image here
      <input type="file" id="photoInput" accept="image/*" capture="environment" />
    </div>

    <img id="preview" alt="Preview" />

    <button id="uploadBtn" onclick="uploadFood()" disabled>Scan label</button>

    <div id="status"></div>
  </div>

  <!-- Result card -->
  <div class="card" id="resultCard" style="display:none">
    <h2>Extracted data</h2>
    <pre id="resultJson"></pre>
  </div>

  <!-- Foods list -->
  <div class="card">
    <h2>Foods in database</h2>
    <div class="foods-list" id="foodsList">Loading…</div>
  </div>
</main>

<script>
  const photoInput = document.getElementById('photoInput');
  const preview    = document.getElementById('preview');
  const uploadBtn  = document.getElementById('uploadBtn');
  const dropZone   = document.getElementById('dropZone');
  const status     = document.getElementById('status');

  // Show preview when a file is selected
  photoInput.addEventListener('change', () => {
    const file = photoInput.files[0];
    if (!file) return;
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    uploadBtn.disabled = false;
    dropZone.textContent = file.name;
    const inp = document.createElement('input');
    inp.type = 'file'; inp.id = 'photoInput'; inp.accept = 'image/*'; inp.capture = 'environment';
    inp.addEventListener('change', () => photoInput.dispatchEvent(new Event('change')));
  });

  // Drag-and-drop
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) {
      photoInput.files = e.dataTransfer.files;
      photoInput.dispatchEvent(new Event('change'));
    }
  });

  async function uploadFood() {
    const name = document.getElementById('foodName').value.trim();
    const file = photoInput.files[0];

    if (!name) { setStatus('Enter a food name.', 'error'); return; }
    if (!file)  { setStatus('Select a photo.', 'error'); return; }

    uploadBtn.disabled = true;
    setStatus('Scanning label with Claude… this may take a few seconds.', '');

    const form = new FormData();
    form.append('food_name', name);
    form.append('photo', file);

    try {
      const res  = await fetch('/foods/upload', { method: 'POST', body: form });
      const data = await res.json();

      if (!res.ok) {
        setStatus(data.detail || 'Error uploading.', 'error');
      } else {
        setStatus(`✓ Saved as "${data.message.split("'")[1]}"`, 'success');
        document.getElementById('resultJson').textContent = JSON.stringify(data.data, null, 2);
        document.getElementById('resultCard').style.display = 'block';
        loadFoods();
      }
    } catch (err) {
      setStatus('Network error. Is the server running?', 'error');
    } finally {
      uploadBtn.disabled = false;
    }
  }

  function setStatus(msg, type) {
    status.textContent = msg;
    status.className   = type;
  }

  async function loadFoods() {
    try {
      const res  = await fetch('/foods');
      const data = await res.json();
      const list = document.getElementById('foodsList');
      list.innerHTML = '';
      data.available_foods.sort().forEach(name => {
        const tag = document.createElement('span');
        tag.className   = 'food-tag';
        tag.textContent = name;
        tag.onclick     = () => window.open(`/foods/${name}`, '_blank');
        list.appendChild(tag);
      });
    } catch {
      document.getElementById('foodsList').textContent = 'Could not load foods.';
    }
  }

  loadFoods();
</script>
</body>
</html>
