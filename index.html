<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nutrition Label Scanner</title>
  <link rel="icon" type="image/png" href="/static/comida.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }

    header {
      background: #168ea3;
      color: white;
      padding: 1rem 1.5rem;
      font-size: 1.2rem;
      font-weight: 600;
    }

    main { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
      margin-bottom: 1.5rem;
    }

    h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #444; }

    label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: .35rem; }

    input[type="text"] {
      width: 100%; padding: .6rem .8rem; border: 1px solid #d1d5db;
      border-radius: 8px; font-size: .95rem; margin-bottom: 1rem;
    }

    .drop-zone {
      border: 2px dashed #d1d5db; border-radius: 10px;
      padding: 2rem; text-align: center; cursor: pointer;
      color: #9ca3af; font-size: .9rem; transition: border-color .2s;
      margin-bottom: 1rem; position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #168ea3; color: #168ea3; }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }

    #preview { max-width: 100%; border-radius: 8px; display: none; margin-bottom: 1rem; }

    button {
      width: 100%; padding: .75rem; background: #168ea3; color: white;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    button:hover { background: #15807b; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }

    #status { margin-top: 1rem; font-size: .875rem; }
    .success { color: #168ea3; }
    .error   { color: #dc2626; }

    pre {
      background: #f9fafb; border-radius: 8px; padding: 1rem;
      font-size: .8rem; overflow-x: auto; white-space: pre-wrap;
    }

    .foods-table {
      width: 100%; border-collapse: collapse;
      font-size: .875rem;
    }
    .foods-table-wrap {
      max-height: 220px; overflow-y: auto;
      border: 1px solid #e5e7eb; border-radius: 8px;
    }
    .foods-table th {
      background: #f3f4f6; text-align: left;
      padding: .5rem .75rem; font-weight: 600; color: #6b7280;
      position: sticky; top: 0;
    }
    .foods-table td { padding: .45rem .75rem; border-top: 1px solid #f3f4f6; }
    .foods-table tr:hover td { background: #f9fafb; }
    .foods-table .name-cell { cursor: pointer; color: #0e5e6c; font-weight: 500; }
    .foods-table .name-cell:hover { text-decoration: underline; }
    .foods-table .del-btn {
      background: none; border: none; color: #9ca3af;
      cursor: pointer; font-size: 1rem; padding: 0; width: auto; line-height: 1;
    }
    .foods-table .del-btn:hover { color: #dc2626; background: none; }
  </style>
</head>
<body>

<header>Nutrition Label Scanner</header>

<main>
  <!-- Upload card -->
  <div class="card">
    <h2>Add a new food</h2>

    <label for="foodName">Food name</label>
    <input type="text" id="foodName" placeholder="e.g. YogurtDanone" />

    <label>Nutrition label photo</label>
    <div class="drop-zone" id="dropZone">
      Click or drag an image here
      <input type="file" id="photoInput" accept="image/*" capture="environment" />
    </div>

    <img id="preview" alt="Preview" />

    <button id="uploadBtn" onclick="uploadFood()" disabled>Scan label</button>

    <div id="status"></div>
  </div>

  <!-- Result card -->
  <div class="card" id="resultCard" style="display:none">
    <h2>Extracted data</h2>
    <pre id="resultJson"></pre>
  </div>

  <!-- Foods list -->
  <div class="card">
    <h2>Foods in database</h2>
    <input type="text" id="foodSearch" placeholder="Search…" oninput="filterFoods()" style="margin-bottom:.75rem" />
    <div class="foods-table-wrap">
      <table class="foods-table">
        <thead><tr><th>Name</th><th></th></tr></thead>
        <tbody id="foodsList"><tr><td colspan="2">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<script>
  const photoInput = document.getElementById('photoInput');
  const preview    = document.getElementById('preview');
  const uploadBtn  = document.getElementById('uploadBtn');
  const dropZone   = document.getElementById('dropZone');
  const status     = document.getElementById('status');

  // Show preview when a file is selected
  photoInput.addEventListener('change', () => {
    const file = photoInput.files[0];
    if (!file) return;
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    uploadBtn.disabled = false;
    dropZone.textContent = file.name;
    const inp = document.createElement('input');
    inp.type = 'file'; inp.id = 'photoInput'; inp.accept = 'image/*'; inp.capture = 'environment';
    inp.addEventListener('change', () => photoInput.dispatchEvent(new Event('change')));
  });

  // Drag-and-drop
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) {
      photoInput.files = e.dataTransfer.files;
      photoInput.dispatchEvent(new Event('change'));
    }
  });

  async function uploadFood() {
    const name = document.getElementById('foodName').value.trim();
    const file = photoInput.files[0];

    if (!name) { setStatus('Enter a food name.', 'error'); return; }
    if (!file)  { setStatus('Select a photo.', 'error'); return; }

    uploadBtn.disabled = true;
    setStatus('Scanning label with Claude… this may take a few seconds.', '');

    const form = new FormData();
    form.append('food_name', name);
    form.append('photo', file);

    try {
      const res  = await fetch('/foods/upload', { method: 'POST', body: form });
      const data = await res.json();

      if (!res.ok) {
        setStatus(data.detail || 'Error uploading.', 'error');
      } else {
        setStatus(`✓ Saved as "${data.message.split("'")[1]}"`, 'success');
        document.getElementById('resultJson').textContent = JSON.stringify(data.data, null, 2);
        document.getElementById('resultCard').style.display = 'block';
        loadFoods();
      }
    } catch (err) {
      setStatus('Network error. Is the server running?', 'error');
    } finally {
      uploadBtn.disabled = false;
    }
  }

  function setStatus(msg, type) {
    status.textContent = msg;
    status.className   = type;
  }

  function filterFoods() {
    const q = document.getElementById('foodSearch').value.toLowerCase();
    document.querySelectorAll('#foodsList tr').forEach(row => {
      const name = row.querySelector('.name-cell')?.textContent.toLowerCase() ?? '';
      row.style.display = name.includes(q) ? '' : 'none';
    });
  }

  async function loadFoods() {
    try {
      const res  = await fetch('/foods');
      const data = await res.json();
      const list = document.getElementById('foodsList');
      list.innerHTML = '';
      if (data.available_foods.length === 0) {
        list.innerHTML = '<tr><td colspan="2" style="color:#9ca3af">No foods yet.</td></tr>';
        return;
      }
      data.available_foods.sort().forEach(name => {
        const tr = document.createElement('tr');

        const nameTd = document.createElement('td');
        nameTd.className = 'name-cell';
        nameTd.textContent = name;
        nameTd.onclick = () => window.open(`/foods/${name}`, '_blank');

        const delTd = document.createElement('td');
        delTd.style.textAlign = 'right';
        const del = document.createElement('button');
        del.className = 'del-btn';
        del.textContent = '×';
        del.title = `Delete ${name}`;
        del.onclick = async () => {
          if (!confirm(`Delete "${name}"?`)) return;
          try {
            const res = await fetch(`/foods/${name}`, { method: 'DELETE' });
            if (res.ok) loadFoods();
            else {
              const d = await res.json();
              alert(d.detail || 'Error deleting.');
            }
          } catch {
            alert('Network error.');
          }
        };
        delTd.appendChild(del);

        tr.appendChild(nameTd);
        tr.appendChild(delTd);
        list.appendChild(tr);
      });
    } catch {
      document.getElementById('foodsList').textContent = 'Could not load foods.';
    }
  }

  loadFoods();
</script>
</body>
</html>
